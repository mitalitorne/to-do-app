<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/0f58da84e1.js" crossorigin="anonymous"></script>
    <title>To-Do-App</title>
</head>
<body>
    <div class="app-bg">
        <div class="todo-app">

            <h1>To Do List</h1>
            <button id="toggleInputBtn">+</button>
            <div id="input-section">
                <input type="text" placeholder="Enter your task" id="taskInput">
                <button id="addBtn">Add</button>
            </div>

            <!-- Error Message on empty input -->
            <p id="errorMsg"></p>

            <!-- Progress Bar -->
            <p id="progressText">
                No tasks added
            </p>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>


            <!-- Display tasks once entered by user -->
            <ul id="taskList"></ul>


        </div>
   </div>

    <script src="./index.js"></script>
</body>
</html>
